<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - TP Spring Security</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            border: 1px solid #bee5eb;
        }
        .info h4 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>🔐 Authentification</h2>
    <div class="subtitle">TP 9 - Spring Security</div>

    <div th:if="${param.error}" class="error">
        ❌ Identifiants invalides - Veuillez réessayer
    </div>

    <div th:if="${param.logout}" class="error" style="background:#d4edda; color:#155724; border-color:#c3e6cb;">
        ✅ Vous avez été déconnecté avec succès
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" placeholder="Entrez votre nom d'utilisateur" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
        </div>

        <button type="submit">Se connecter</button>
    </form>

    <div class="info">
        <h4>📝 Comptes de test :</h4>
        <p><strong>malak.nait</strong> / malak2024 (Rôle: USER)</p>
        <p><strong>malak.admin</strong> / admin2024 (Rôle: ADMIN, USER)</p>
        <p><strong>malak.guest</strong> / guest2024 (Rôle: GUEST)</p>
    </div>
</div>
</body>
</html>
